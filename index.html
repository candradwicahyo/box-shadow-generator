<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.4.9/sweetalert2.min.css">
  <title>Box Shadow Generator</title>
</head>
<body>

  <div class="container">
    <div class="content">
      <h1>Box Shadow Generator</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sint odio ab quaerat aperiam mollitia possimus corrupti doloremque rem?
      </p>
    </div>
    <div class="box">
      <div class="box-content">
        <div class="box-wrapper">
          <div class="box-generator"></div>
        </div>
        <div class="input-wrapper">
          <!-- start -->
          <div class="form-group">
            <label for="horizontal">Horizontal Shadow</label>
            <input type="range" id="horizontal" class="input-range" min="-100" max="100" value="0">
          </div>
          <div class="form-group">
            <label for="vertical">Vertical Shadow</label>
            <input type="range" id="vertical" class="input-range" min="-100" max="100" value="0">
          </div>
          <div class="form-group">
            <label for="blur">Blur Radius</label>
            <input type="range" id="blur" class="input-range" min="0" max="100" value="0
            ">
          </div>
          <div class="form-group">
            <label for="spread">Spread Radius</label>
            <input type="range" id="spread" class="input-range" min="-50" max="50" value="0">
          </div>
          <!-- end -->
        </div>
      </div>
      <div class="wrapper">
        <input type="text" id="input-copy" class="input" readonly value="box-shadow: 0 0 0 0 rgba(0,0,0,0.1)">
        <button type="button" class="button button-blue" id="copy">Copy</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.4.9/sweetalert2.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
